<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a3420"/>
      <stop offset="100%" style="stop-color:#3d2214"/>
    </linearGradient>
  </defs>
  <!-- Fundo marrom -->
  <rect width="512" height="512" rx="64" ry="64" fill="url(#bg)"/>
  <!-- Borda dourada -->
  <rect x="32" y="32" width="448" height="448" rx="48" ry="48" fill="none" stroke="#c17b3c" stroke-width="16"/>
  <!-- Chocolate emoji -->
